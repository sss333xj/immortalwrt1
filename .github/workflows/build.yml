name: Build ImmortalWrt

on:
  workflow_dispatch:
    inputs:
      debug:
        description: 'Debug mode'
        required: false
        default: '0'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Build x86_64
        uses: immortalwrt/gh-action-sdk@v1
        with:
          target: x86_64
          patches: true
          config_file: .config
