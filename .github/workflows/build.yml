name: Build ImmortalWrt x86_64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ubuntu
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache git libncurses5-dev libssl-dev python3

      - name: Use minimal feeds
        run: |
          cat > feeds.conf.default << 'EOF'
          src-git packages https://github.com/immortalwrt/packages.git
          src-git luci https://github.com/immortalwrt/luci.git
          EOF

      - name: Update feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a -f

      - name: Config x86_64
        run: |
          make defconfig
          # 替换整行来设置 x86_64
          sed -i 's/.*CONFIG_TARGET_x86_64.*/CONFIG_TARGET_x86_64=y/' .config
          # 添加或修改分区大小
          if ! grep -q "CONFIG_TARGET_ROOTFS_PARTSIZE" .config; then
            echo "CONFIG_TARGET_ROOTFS_PARTSIZE=4096" >> .config
          else
            sed -i 's/CONFIG_TARGET_ROOTFS_PARTSIZE=.*/CONFIG_TARGET_ROOTFS_PARTSIZE=4096/' .config
          fi
          cat .config | grep -E "CONFIG_TARGET_x86|CONFIG_TARGET_ROOTFS"

      - name: Build x86_64
        run: |
          make -j$(nproc) world

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-x86_64-4096mb
          path: |
            bin/targets/x86_64/generic/**
