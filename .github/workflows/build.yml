name: Build ImmortalWrt

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ubuntu
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache git libncurses5-dev libssl-dev python3 python3-distutils

      - name: Update feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a -f

      - name: Clean
        run: |
          make clean
          rm -rf ./build_dir ./staging_dir ./tmp

      - name: Config
        run: |
          make defconfig
          sed -i 's/CONFIG_TARGET_ROOTFS_PARTSIZE=.*/CONFIG_TARGET_ROOTFS_PARTSIZE=5120/' .config
          make defconfig

      - name: Download
        run: make download -j$(nproc)

      - name: Build
        run: |
          make -j$(nproc) world V=s 2>&1 | tail -100
