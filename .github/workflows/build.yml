name: Build ImmortalWrt

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Disable problematic feeds
        run: |
          # Comment out telephony feed which has problematic kamailio packages
          sed -i 's/^src-git telephony/#src-git telephony/' feeds.conf.default
          cat feeds.conf.default

      - name: Update feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Prepare config
        run: |
          make defconfig
          sed -i 's/CONFIG_TARGET_ROOTFS_PARTSIZE=.*/CONFIG_TARGET_ROOTFS_PARTSIZE=5120/' .config

      - name: Build x86_64
        uses: immortalwrt/gh-action-sdk@v1
        with:
          target: x86_64
          config_file: .config
